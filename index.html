<!DOCTYPE html>
<html lang="hu" ng-app="catApp">
<head>
    <meta charset="UTF-8">
    <title>Macska Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.js"></script>

    <link rel="stylesheet" href="style/LoginStyle.css">
    <link rel="stylesheet" href="style/WebshopStyle.css">
</head>
<body>
    <div ng-view></div>

    <script src="app/app.module.js"></script>
    <script src="app/models/AuthModel.js"></script>
    <script src="app/models/CatModel.js"></script>
    <script src="app/models/OrderModel.js"></script>

    <script src="app/controllers/LoginController.js"></script>
    <script src="app/controllers/CatController.js"></script>
    <script src="app/controllers/StepperController.js"></script>

    <script type="module">
        import { APP } from './app.js';
        window.APP = APP;
    </script>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
    
    <div id="sikeresVasarlas" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">
                Sikeresen hozzáadva a kosárhoz!
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>

    <div id="liveToast" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">
                Hiba! Kérlek ellenőrizd a megadott adatokat!
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>

</div>
</body>
</html>
